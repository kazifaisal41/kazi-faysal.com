<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kazi Mohammad Faysal · AI & Data Leader</title>
<meta name="description" content="Global AI & Data Strategist with cross-continental leadership experience.">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">

<style>

/* RESET */
*{margin:0;padding:0;box-sizing:border-box}

/* BASE */
body{
  font-family:'Inter',sans-serif;
  background:#06060f;
  color:#EAEAFF;
  overflow-x:hidden;
}

/* SMOOTH SCROLL */
html{scroll-behavior:smooth}

/* ANIMATED GRADIENT */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  z-index:0;
  background:
    radial-gradient(circle at 10% 20%, rgba(184,150,12,0.08), transparent 60%),
    radial-gradient(circle at 80% 70%, rgba(80,120,255,0.08), transparent 60%);
}

/* CONTAINER */
.container{
  max-width:1200px;
  margin:auto;
  padding:2rem;
  position:relative;
  z-index:2;
}

/* HEADER */
.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:40px;
}

.logo{
  font-weight:800;
  color:#e2b616;
}

.lang{
  display:flex;
  gap:6px;
}

.lang button{
  background:transparent;
  border:1px solid rgba(255,255,255,0.2);
  color:#aaa;
  padding:4px 10px;
  border-radius:20px;
  cursor:pointer;
}

.lang button:hover{color:#fff}

/* HERO */
.hero{
  display:grid;
  grid-template-columns:1fr 1.2fr;
  gap:3rem;
  align-items:center;
  min-height:85vh;
}

.profile{
  width:100%;
  max-width:320px;
  border-radius:20px;
  box-shadow:0 20px 60px rgba(0,0,0,0.6);
}

.name{
  font-family:'Playfair Display';
  font-size:clamp(2.5rem,5vw,4rem);
}

.title{
  color:#e2b616;
  margin:10px 0;
}

.summary{
  color:#aaa;
  margin-top:15px;
  line-height:1.7;
}

/* METRICS */
.metrics{
  display:flex;
  gap:20px;
  margin-top:20px;
}

.metric{
  font-size:14px;
  color:#ccc;
}

/* SECTION */
.section{
  margin-top:5rem;
}

.section h2{
  margin-bottom:1.5rem;
  font-family:'Playfair Display';
}

/* CARD */
.card{
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.08);
  padding:1.5rem;
  border-radius:16px;
  margin-bottom:1rem;
  transition:0.3s;
}

.card:hover{
  transform:translateY(-6px);
  border-color:#e2b616;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:1rem;
}

/* CTA */
.cta{
  text-align:center;
  margin-top:4rem;
}

.btn{
  padding:12px 24px;
  border-radius:40px;
  text-decoration:none;
  margin:5px;
  display:inline-block;
  font-weight:600;
}

.primary{background:#b8960c;color:#000;}
.outline{border:1px solid #b8960c;color:#e2b616;}

/* FOOTER */
footer{
  margin-top:50px;
  text-align:center;
  color:#666;
  font-size:12px;
}

/* MOBILE */
@media(max-width:800px){
  .hero{grid-template-columns:1fr;text-align:center}
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="container">

<!-- HEADER -->
<div class="header">
  <div class="logo">Kazi Faysal</div>
  <div class="lang">
    <button onclick="setLang('en')">EN</button>
    <button onclick="setLang('zh')">中文</button>
    <button onclick="setLang('ko')">한국어</button>
    <button onclick="setLang('ja')">日本語</button>
  </div>
</div>

<!-- HERO -->
<section class="hero">

<div>
<img src="YOUR_IMAGE_URL" class="profile">
</div>

<div>
<h1 class="name"></h1>
<div class="title"></div>
<p class="summary"></p>

<div class="metrics">
<div class="metric">🌍 Global</div>
<div class="metric">🤖 AI Strategy</div>
<div class="metric">📊 Data Leadership</div>
</div>

<div style="margin-top:20px;">
<a href="https://www.linkedin.com/in/kazifaysal/" class="btn primary">LinkedIn</a>
</div>

</div>

</section>

<!-- EXPERIENCE -->
<section class="section">
<h2 id="exp-title"></h2>

<div class="card" id="exp1"></div>
<div class="card" id="exp2"></div>
<div class="card" id="exp3"></div>

</section>

<!-- SKILLS -->
<section class="section">
<h2 id="skill-title"></h2>

<div class="grid">
<div class="card">Machine Learning / AI Systems</div>
<div class="card">Cloud & Data Platforms</div>
<div class="card">AI Governance</div>
<div class="card">Global Leadership</div>
</div>

</section>

<!-- CTA -->
<section class="cta">
<h2 id="contact-title"></h2>
<a href="https://www.linkedin.com/in/kazifaysal/" class="btn primary">Connect</a>
</section>

<footer>
© Global AI & Data Leadership Profile
</footer>

</div>

<script>

/* TRANSLATIONS */
const t={
en:{
name:"Kazi Mohammad Faysal",
title:"AI & Data Transformation Leader",
summary:"Global AI strategist delivering scalable transformation across enterprise ecosystems.",
expTitle:"Global Experience",
exp1:"Chief AI Strategist — Cross-border AI leadership (Singapore / USA).",
exp2:"Senior Director Data Science — Built enterprise AI systems (Europe / APAC).",
exp3:"AI Consultant — China market expansion & data systems.",
skillTitle:"Core Expertise",
contact:"Let’s Connect"
},
zh:{
name:"卡兹·费萨尔",
title:"人工智能与数据领导者",
summary:"全球AI战略专家，推动企业级数字化转型。",
expTitle:"全球经验",
exp1:"首席AI战略官",
exp2:"数据科学总监",
exp3:"AI顾问",
skillTitle:"核心能力",
contact:"联系"
},
ko:{
name:"카지 파이살",
title:"AI 및 데이터 리더",
summary:"글로벌 AI 전략 전문가.",
expTitle:"글로벌 경험",
exp1:"AI 전략 책임자",
exp2:"데이터 디렉터",
exp3:"컨설턴트",
skillTitle:"핵심 역량",
contact:"연락하기"
},
ja:{
name:"カジ・ファイサル",
title:"AI・データリーダー",
summary:"グローバルAI戦略専門家。",
expTitle:"グローバル経験",
exp1:"AI戦略責任者",
exp2:"データディレクター",
exp3:"コンサルタント",
skillTitle:"コアスキル",
contact:"連絡する"
}
};

function setLang(lang){
localStorage.setItem("lang",lang);
apply(lang);
}

function apply(lang){
document.querySelector(".name").innerText=t[lang].name;
document.querySelector(".title").innerText=t[lang].title;
document.querySelector(".summary").innerText=t[lang].summary;
document.getElementById("exp-title").innerText=t[lang].expTitle;
document.getElementById("exp1").innerText=t[lang].exp1;
document.getElementById("exp2").innerText=t[lang].exp2;
document.getElementById("exp3").innerText=t[lang].exp3;
document.getElementById("skill-title").innerText=t[lang].skillTitle;
document.getElementById("contact-title").innerText=t[lang].contact;
}

/* AUTO LANGUAGE DETECT */
window.onload=()=>{
let lang=navigator.language.slice(0,2);
if(!t[lang]) lang="en";
apply(lang);
};

</script>

</body>
</html>
